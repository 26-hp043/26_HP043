name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.20
      - run: ruff check src/ alembic/ tests/
      - run: ruff format --check src/ alembic/ tests/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cii
          POSTGRES_PASSWORD: cii
          POSTGRES_DB: cii_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - run: pip install -e ".[dev]"
      - run: pip install numpy==2.1.0
      - run: pytest --cov=cii_platform --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: postgresql://cii:cii@localhost:5432/cii_test
